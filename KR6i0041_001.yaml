body:
  text: 拔苦與樂大慈悲法大慈以無瞋善根為體大悲以無瞋癡為性此各有三一有情緣緣假有情故二法緣不見有情唯有法故三無緣法相亦無唯有真理故或有情緣緣有情起法緣緣十二分教起無緣緣真如起無所緣故彌勒慈導萬物故演慈悲之法曇讖云此寶樹中亦有金鸞寶鳳白赤略而不說更勘一一垣墻至厚十四由旬者述云第四廣垣墻也垣謂園墻高六十二由旬者顯生彼者逾破六十二見故厚十四由旬者表御摧十四不可記事應法師云梵音喻繕那此云合也應計應合爾許廣量同此方驛也又解應量自古聖王一日行也傳解雖異今依藏論五百弓為一俱盧舍八俱盧舍為一踰繕那今言由旬者訛略也此表生天者皆超八妄想是六十二見等之本故此四嚴中初二進行皆歸一乘發心證果有差別故次一破瞋癡濟有情類後一永離外道耶見由此勝用故重顯之垣于煩反四周墻也釋名云垣援之人所依阻以為援衛也墻障也所以自障蔽也五百億至圍繞此垣者述云第三龍王守護有三初龍守護次雨寶樹後樹說法此初也法王都化天神衛警恐致外侵龍王守護五百億者顯內具五力四魔不能屈伏外有龍王非人不能逼害內持五戒諸惡不侵外感龍圍橫灾自滅問此龍王為化為實答曰化龍問天宮亦有實龍王不答曰亦有但化龍王無毒害故現化莊嚴此乃是彌勒大悲願力之所示現也一一龍王至莊嚴垣上者述云此次雨寶樹也因五根起七財故感龍王雨樹嚴餝七聖財者信戒聞捨慧慚愧廣如顯揚論自然有風至諸波羅蜜者述云此後樹說法也風喻大慈悲任運吹擊真俗智樹棠觸談演如是等法所謂一切有漏逼迫自性皆苦所執法體都無名空有為起盡遷流生滅無總自體常一實我由此能令諸修行者越到彼岸名波羅蜜上雖散解今應總釋斯乃宮隨願起莊以七寶之園華逐光生嚴以百億之果加復頗梨發采婉轉出慈悲之聲寶為主名造法堂以實言之具作內院文亦有三初大神發願次所願果遂後諸天覩勝發願往生初中復二初儀範後發願此初也牢度跋提此云惡主治惡之主故此乃鬼神與華嚴經夜叉天相似實潛難測名曰為神神中最勝曰大普憑威力遍禮十方欲解廣大發弘誓願雖知凡聖同感內院方成菩薩力增多由聖現一大神者表無漏智能起妙土故佛地經云勝出世間善根所起如如意珠有神用故亦是凡夫發菩提心加行智感若我福德至自然出珠者述云此後發願也宣妙義合名善法堂表親尊重珠從額出內院宮宇如下自陳法堂尊勝故標願首既發願已至表裏映徹者述云第二所願果遂有五一作宮二作園三作坐四作柱五天宮天女寶色皆同初又有八一作宮二蘭楯三天子女四手生華五光明六樂器七起儛八說法初中有二初出珠後作宮此初也琉璃碧色頗梨紅色額上之珠舉碧紅為道餘衆色類一切皆足或此二寶一切色類皆悉具足紫謂紫色紺者說文云帛深青而揚赤色紺含也青而含赤色今此中紺與彼稍異如紫青色珠乃琉璃頗梨之色紫紺摩尼之光內外朎朧故表裏映徹此即表彌勒聞百億總持之門無相不顯無障不淨也此摩尼光至微妙寶宮者述云此後作宮也四十九重者持戒堅牢宮遂重密此表彌勒既過十信等四十心及極喜等九地而居法雲故宮有四十九重以所修行有四十九一一欄楯至所共合成者述云第二作欄楯也總持如欄楯即由彌勒所領百億總持故外感萬億摩尼億數有多少故前後無違諸欄楯間至五百億天女者述云第三化天子天女即方便住持諸行故子即般若殖種德本故此二不同廣如彌勒問論德種雖多必由九品之慧故云九億方便雖衆而由信等五根之力以涉百億之界故云五百億一一天子至七寶華者述云第四手生蓮華般若作用雖復無量皆由七聖財以含圓果故外感億萬七寶華理實方便亦含道果但望般若功用有故所以不說至不鼓自鳴者述云第六化樂器也由智慧力辨才無滯能生有情歡悅之心故名樂器彌勒既居第十地於諸病藥皆無功用故云不鼓鳴此聲出時至競起歌儛者述云第七起儛也樂聲既動女起以儛即表辨才唱響應方便亦起身化以利衆生時詠歌音至無上道心者述云第八說法也雖復詠歌不依生死之戲皆演十善四弘誓願即表彌勒非唯身業利益亦以語業開化十善即生天之因四弘即成道之因何者四也七佛經云一覆育一切衆生猶如椅船度人無倦二節含萬物猶如大虗三願使我身猶如藥樹其有聞者患苦悉除四願我當來得成佛時所度衆生如恆河沙是為菩薩度濟之心菩提資糧論云若未度衆生我當度之未解脫者我當解脫未蘇息者應當蘇息未寂滅者我當寂滅經論實弘誓既多隨談一義亦無違是故諸天聞已發大乘心發大乘心有七因緣如法印經云發菩提心有七種因一者諸佛教化二者見法欲滅三者於諸衆生起大慈悲四者菩薩教化五者因布施故六者學他七者聞說如來三十二相八十種好初三發心能護正法疾成無上覺餘四發心非真菩薩不能護持諸佛持正法疾成無上覺今此發心既因彌勒菩薩教化故非真實也此上八嚴由聖行八道受八解脫樂凡持八戒如次所感聖凡衆行助正智等之所集成如慧為先安布間餝故能致此不爾何緣有斯勝處上雖散解今應總釋蓋摩尼欄楯映餝微妙之宮天化紅蓮光含清淨之樂於是寶慧自鳴乘輪雲而屢儛清歌發𪝥聞法音而𣫍心斯願力難思故得此莊嚴時諸薗中至琉璃渠者述云第二作園有二初辨七事嚴後結生彼得初即有七此初八色渠也八色者青黃赤白紅紫碧緑此表彌勒能起等八種律儀已得成就定依戒渠故有義八色琉璃為渠名為八色義亦可也一一渠至而用合成者述云第二寶珠合成諸寶即況百行百行合成律儀故百行必由信等五根故云五億一一渠中有八味水者述云第三八味事也即前八色皆具八味故有說八功德水可愛味故名八正行故其水上踊至如寶華流者述云第四生四華事四華者青黃赤白也即渠流八水繞虹梁而吐浪色發四華映赤門而散釆又八色之水從華而出四色之華從水而生水色交映如寶華流此表八正行當顯常等四德之果一一華上至莊嚴身相者述云第五華生天女常等果上必有方便方便之本即持戒也此表持七支戒防三世惡三善受故所感果有二十四手中自然至自然盈滿者述云第六手出寶器手況教也藏論云正法教手故此表大千衆生聽受正法生信精進等五根俱行善法欲等故云五百億即初發心隨其自乘來頓希道果故云滿甘露左肩荷佩至六波羅蜜者述云第七天女從水出也諸天女左佩瓔珞右負樂器從色水而出如瑞雲住空口讚菩薩所行六度此之表慈氏左相好右辨才從空而出如雲含雨雨正法雨利益衆生總而言云凡持七支戒及修七聖財聖行七覺除七隨眠之所招感如是天女或非實女或佛菩薩所共化成莊嚴道場或是女人宿持淨戒精進無犯之所感現不可凡心之所測度若有往生至天女侍御者述云第二結生彼得此表衆生生彼天者得彌勒方便化導也亦有七寶至高四由旬者述云第三座莊嚴有二初座量高廣後座寶莊嚴此初也何者七寶如稱讚淨土經云一金二銀三吠琉璃四頗胝迦五赤真珠六阿濕摩揭抵波七牟娑洛揭抵婆解云金銀二寶此土有故諸教皆存存此方名真諦云梵音弗師羅伽此云黃色寶即金也梵音旃陀羅乾此云白色寶即銀也吠琉璃者正梵音也毗琉璃者訛也真諦梁論抄云琉璃者是青色寶燒不可壞唯有鬼神有神力者能破為器或是其金翅鳥卵也頗胝迦者即黃緑色寶佛地論云羯雞恆諾迦寶智論云過一千歲冰化為頗梨珠赤真珠者佛地論云赤蟲所出名赤真珠或珠體赤名赤真珠真諦云即無價寶珠也阿濕摩揭抵婆者云馬瑙真諦云赤色寶即違無性論論云是帝青等故牟婆洛揭抵婆者昔云車渠真諦云即紺色寶智論云金出山石沙赤銅中真珠出魚腹中竹中蛇腦龍珠出龍腦中珊瑚出海中石化為頗梨珠大業論云七寶皆是石所攝然七寶隨方愛重經論不同不可致疑問此七寶坐何名師子答智論云佛為人中師子佛所坐處若床若地皆名師子座廣說如彼譬喻經云五百師子聞佛出世化諸衆生皆生天人禽獸若盡我當何食心中懷毒欲往害佛佛即化作絶妙之座在師子頭上而坐衆人見之名曰師子座今此坐得彼智論清淨法界內含四德化身之座高四由旬閻浮檀金至以為莊嚴者述云此次座莊嚴有九此金寶嚴也彌勒三業隨智而行超出凡小之所嚴故即華嚴云金色師子座也座四角頭生四蓮華者述云第二華莊嚴也慈悲喜捨內四無量外感四華故二蓮華百寶所成者述云第三百寶嚴也十善業道自作教他讚歎慶喜少分多分全分少時多時盡壽行故一一有十名為百行內修內行外百寶成所以經前後多說百數一一寶出百億光明者述云第四光明嚴也由百行之所成智放光明慧破愚暗故其光微妙至莊嚴寶帳者述云第五寶帳嚴也兼修信等助百行故云五百億衆行互助故云雜華時十方面至以為寶鈴者述云第六梵寶嚴也內修四辨外有大梵懸鈴大人敬重此表彌勒既過等覺百千劫而居終位修十地行而成辨才時小梵王至彌覆帳上者述云第七梵網嚴也內修總持外得小梵為網故總而言之將欲敷決定說先起師子之座示其莊嚴綺麗瑩餝精華故金道輝百寶之光珠帳垂千梵之網故云彌覆其上爾時百千至以布座上者述云第八華布座嚴即表彌勒般若方便既得滿故必生無上道果也是諸蓮華至侍立帳內者述云第九天女侍帳即表慈氏善巧方便演正法手化導百億中立趣也以此九嚴足前座量有十莊嚴皆由凡除十惡修十善或菩薩亦修十無盡戒之所招致時宮四角各有寶柱者述云第四作柱有四一持宮寶柱二摩尼交珞三閣間樂音四樂音宣法此初也曇識解此即持四十九重法堂之四柱又可堂外四角有四寶柱莊嚴之具初善順經文一一寶柱至諸波羅蜜者述云梵摩尼者淨魔尼或大梵王如意之珠拄種種莊嚴如是天宮至亦同寶色者述云第五天女寶色皆同欲顯內院種種莊嚴為令有情同入佛慧爾時十方至兜率天宮者述云第三諸天覩勝發願往生彌勒生已方皆發願亦有未生而發願者總而言之蓋寶華坐天童侍帳珠柱持宮摩尼交絡以清樂鏗鏘六度韻而成寶光皎潔諸天映而同色覩慈華麗殊勝莊嚴莫不住想歸依願生兜率此上述第二大神作內院已訖時兜率天宮有五大神者述云第三辨五大神於外內宮種種嚴餝有二初總標後別顯此初也由菩薩等內修五蘊妙用無方外感五神威力無比問若言天上有神者便應天中有餘道耶答天牛天馬即是畜生鬼等帝釋座處今神作天宮之有鬼神道既有鬼有畜生亦應有人有獄天上既爾餘亦當各修故華嚴經曰人生法有二天守護一名同名二名同生天得見人人不得見天即人中有天又云夜天水天地天河天天既通類諸道悉通於義便當五道道各有五五五二十五道權類應爾第一大神至適衆生意者述云第二別顯有五此初神也內持戒蘊得尊高如寶幢高顯故戒七支雨七寶由持戒故各稱人心感得樂音適衆生意第二大神至以為導引者述云此次定蘊果也內修空蘊外感華德定水徹清出妙華故起四無量垂覆四生故雨衆華化成華蓋無量衆行助嚴禪定感百千幡以為導引第三大神至繞宮七匝者述云此次慧蘊果也內具慧蘊說法利物破無明臰外感大神名曰香音音此岸香六銖賈直娑婆世界智慧可量如海此岸香能除七漏故繞七匝七漏者謂見念愛修根惡親近漏廣如涅槃經第四大神至助菩提音者述云此次解脫蘊果也內滿解脫蘊外感大神名曰喜樂遠離憂苦得勝解喜樂心既決定修行能成故雨如意珠也心常決定住於真如外感神住在幢幡既說三歸又說五戒及諸善法饒益者利樂義勸者讚勉義助者資益齊借義音謂音聲者謂行者此即總顯神珠演說三歸五戒等利樂勸勉發求大菩提聲之行者指異生處不敢輒定但大聖示身隨機異見見既不同生何同處由是道理不足致怪有義華嚴經指其養處故不相違父母非唯生亦有養者故不爾如何賢愚經云國王聞之心惱生懼恐奪其國伺其未長方欲除之內人既知潛報父母私送舅氏避難習業基云賢愚經表生處上生經指養處舅名波羅利故雖有三解第二為勝初違慈氏一往之化故諸相違之文止應無會釋義故後雖通二經華嚴有違故結跏趺坐如入滅定者述云第三入滅相也結者交也跏者重也釋迦表化緣盡故右脅枕手而入涅槃顯彌勒佛利樂未終當得果智事方盡故二相不同表極未極有差別也似入涅槃實未圓滅方上生故如入滅定身紫金色至兜率陀天者述云第四後生相也身紫金色者表利當生最第一故如百千日者能破衆生癡常想故其身舍利至不動不搖者述云第五舍利形也舍利者稻穀也䭾都者體也佛體大小如稻穀量故以為名釋迦如來碎分舍利表分身十方導利多也彌勒全身表居兜率行一佛化故如鑄金不動搖者表佛法身本無生滅動作事故又解肥瘦如常長短不變鎚打不舒色似金尊故例鑄金身圓光中至字義炳然者述云第六圓光神異梵音三摩地此云等持三昧者訛也大乘之中妙定及慧字之與義二俱炳然炳然者煥爛之異名也此意即顯圓光之中有定與慧字義煥爛塔目顯然矚其文而義顯故義稱現不爾如何光能現義顯雖入滅禪定智慧由成明煥首楞嚴者此云健行唯佛及第十地菩薩之所得故依涅槃經有五種名一者首楞嚴二者般若波羅蜜三者金剛四者師子吼五者佛性隨其所作立此五名等持雖通諸位而表彌勒居等覺位當成正覺故云首楞嚴時諸人天至供養舍利者述云第七天人供養梵音𡨧堵婆此云積聚昔云兜婆此云塔訛略也時兜率陀天至忽然化生者述云第二答生彼天有六一生處二生相三身量莊嚴四異聖神變五相好光明六說法利益此即初也七寶臺者七財餝故即法堂也師子座者於彼臺中法王位極得無畏故忽至閻浮檀金色者述云第二生相也於師子座上更有蓮華一切佛座淨土等中皆坐蓮華表出生死之淤泥秀二乘之濁水故結跏趺者如盤龍足以左狎右降伏而坐以右押左吉祥而坐既將說法顯作吉祥身色如金表可寶重也無量光三昧經云彌勒白銀色會通而言其體閻浮提金色而外照之光者是銀也是以在表見者為銀色也一切智光仙人慈心經云彌勒金色而於白銀光明以黃金校餝如白銀山此亦有白銀之光會還同前形長十六由旬至以嚴天冠者述云第三身量莊嚴十六由旬者德高無比能越六道超十地故相好之義至下當說壽量隨示同俗故長越天衆真德高故釋迦毗楞伽摩尼者謂能種種現如意珠甄叔迦寶者狀如延圭似赤琉璃或云淨白色或是樹名其華赤色此寶似之因以名焉其天冠寶至住天冠中者述云第四異聖神變即顯心首常共諸佛十方菩薩為伴侶也十八變者一振動依定自在普能振動無數世界故二熾然於其身上發猛焰火於其身下注清冷水或此相違舉身洞然出種種焰故三流布流布光明遍滿無數世界故四示現如其所樂示諸相故五轉變所有自相可變色物皆隨勝解而轉變故六往來隨其所樂縱身往來無障礙故七卷能卷一切雪山王等如一極微故八舒能舒一極微令如雪山王等故九衆像入身一切色像內己身令諸大衆知入身故十同類往趣隨所至類無不同彼故十一隱於大衆前百千度等隱自身十二顯於大衆前復令顯故十三所作自在普於一切諸有情界往來住等所作事中皆自在轉故十四制他神通如來神通普能制伏餘一切具神通者所現神通一生菩薩或最後有所有神通除諸如來悉能制伏其餘一切具神通者所現故十五能施辨才窮盡能與辨才故十六能施憶念若諸有情於法失念能與憶念故十七能施安樂說正法時與聽法者饒益身心輕安之樂故十八放大光明身放光明無數世界令一切有情息衆苦故由此神通能轉所餘有自性物令成餘物故名能變神境智通廣如瑜伽論威力品中說或有經云住天窗中即額中央之名也雖有二本前順澤引長一尋放即右旋蠡真殊解云諸佛豪相眉間者極端嚴故面為尊上間表兩中顯佛恆時貴處中道豪相若舒便長無量卷如秋月圓皎解光白類雪珂暉煥衆景白為色本表作情依時有卷舒顯隨緣現流出衆光者影演五乘相中最勝所以偏說三十二相者始從世尊足有平滿相妙善住猶如奩底地雖高下隨足所蹈皆悉坦然無不等觸終至世尊頂上烏瑟膩沙高顯周圓猶如天蓋廣如般若第三百八十一說二之相皆百福成故云百寶色三十二相由行五修一發心二長時三無間四殷重五無餘之所感德故有五百億色好即隨好隨好有八十種始從世尊指爪狹長薄閏光潔鮮淨如華赤銅終至世尊手足及胸臆前俱有吉祥喜旋德相文同綺畫色類朱丹赤如大般若經中說好之五百億例相可解艷者美義而非焰義雲者出生蔭覆之義由行八萬四千教行逼八萬四千根病因而得相好故出八萬四千光色基云八十隨好由行八萬四千教行之所感故二好美出八萬四千光明雲良恐非也三十二相亦由八萬四千行故亦違經云二相好故與諸天子至法輪之行者述云第六說法利益有三初陳所說次顯利益後示常業此初也表菩薩衆並出生死之淤泥故云各坐華座曰晝三夜三名為六時即住六時恆起六神變說六度行拔六趣生破六隨眠起六塵故有說八地已上不退之行有說十信已上菩薩所行六波羅蜜俱不可然三乘凡聖皆聞此已獲己利故𨒬一時間至三菩提者述云此次利益也今生五根具足五力當圓五眼超五道故成五百億天如是於兜率陀天至廣諸天子者述云此後常業也彼恆常明都無暗夕以起睡相得其夜名佛即不然常度天子而藏論云依華開合諸鳥鳴靜建立日夜者且談一相義亦無違閻浮提歲至下生經說者述云第三住天壽量梵云瞻部此樹名也今閻浮提訛也此間四百歲當彼天一日夜類彼三十日為一月十二月為一年彼天壽四千歲慈氏窮天壽而下生不中夭故此經云當閻浮提五十六億萬歲者依瑜伽論第四立世第七毗婆沙等計此間四百年為彼一日此四千當此一千四百四十億歲彼天四千歲當此五千七百六十億歲即與經文相違今以理推初以人間四百歲為彼一日夜後若以百為一數計即相當一當百故人間中四千歲為彼十日人間四百歲為彼一日人間一千四百四十歲為彼一年人間一萬四千四百歲為彼十年人間一億四萬四千歲為彼百歲人間十四億四萬歲為彼千年彼四千年當人間五十七億六萬歲西方有三億數一十萬為億二百萬為億三千萬為億以理推排以千萬為一億計之即相當矣是故於經字之上應加七字其前六字應萬上安只恐梵本誦有參差亦慮譯家自成謬笇不爾便少一億五萬歲理定應爾智者應知然此歲數四文不同賢劫定意經云彌勒五億七十六萬歲當下作佛其五億者即五十億前以千萬為一億成五十億此以萬萬為一億故七十萬者即七億也十萬為一億故六萬數同更不勞釋唯此一經增減雖殊與論笇同自餘皆別雙卷泥洹經云一億四千歲令不相當此經及一切智光仙人慈心經云五十六億萬歲當於龍華樹下得成佛道義如前已解菩薩處胎及賢愚經云五十六億七千萬歲其六字應云七其七字應云六其千萬者以百為一億笇之六千萬者六千億也義不相違如是推尋雖乖古疏尋文究理亦應無謬菩薩在天壽量曾無中夭生在人間大成佛經說壽六萬億歲天盡其年人間長者時宜現故不同釋迦天盡其年人間早滅衆生厭故化緣畢故處胎經云彌勒人間壽八萬四千歲若依文無可和會彌勒下生成佛利益如下生經天利既畢人機後熟故乃下生基作此解雖有此解與經論違大小教云人間五十歲四天王天為一日夜彼天壽量為五百年忉利天為一日夜彼天壽量為一千歲人間二百年炎摩天為一日夜壽二千歲人間四百年兜率天為一日夜壽四千歲上壽例此可知其量既下上天壽以人壽量作一日夜豈兜率天初以人間四百三十年為一日夜後以百為一數不可定餘亦可然故若爾如何立世經云人間五十歲是四天王天一日一夜由此日夜三十日為一日十二月為年由此年數五百天壽是其壽命當人中歲數九百萬歲人中一百年是忉利天一日一夜云云壽數千年當人中三千六百萬歲人中二百年是夜摩天一日一夜云云壽命二千歲當人中十四千萬人中四百年是減方一小劫故若諸衆生機根成就有見佛緣一一小劫有千佛出亦無有過豈況更有十九小劫故真諦解後十劫中無有佛出及前五劫亦無佛者必非正理又彼引藏論云莊嚴劫中後之三佛在彼釋迦相好業九十一劫中前後而出將知不同一劫有千佛者不然大乘不說三僧祇後於百劫修相好業而言釋迦三祇已滿更於九十一劫值彼三佛修相好業者此亦順小乘不了義說不可引證是故將知觀藥王藥尚經說初千人者同在一莊嚴劫出世亦是一水火劫中千人者同一在賢劫出後千人者同在一星宿劫出現於世即快順智論此劫中有千佛出今撿此二解若談大乘義更有相違知其如次說小大宗義甚可玩矣小乘雖言多成壞劫而大乘宗在一成壞義無違故以何得知多成壞劫為賢劫者賢劫經第九辨賢劫千佛出世時人壽云能仁如來今世壽百歲竪戒如來法氏如來妙御如來此三如來出世時皆人壽億歲修觀如來出時人壽九十億歲等若如後解二十住劫中千佛出者瑜伽婆沙等云增長至八萬減短但十云何得言億歲九十億歲乎無量歲漸減之時應有此億年等故又五獨經云今當賢劫第九住劫已有四佛人壽四萬歲時迦諾迦忖陀佛出世人壽三萬歲迦諾迦牟尼佛出世人壽二萬歲迦葉波佛出世智論第九云前九十劫有三佛後一劫有千佛九十劫初有毗婆尸佛此云勝觀第三十一劫中有二佛一名尸棄此云火二名恕婆附此云一切勝第九十一劫初有四佛一名迦羅鳩滄陀此云冠頂二名迦那含牟尼此云金仙人三名迦葉四名釋迦諸如是等經論皆據隨轉理而作此說復如何知一成壞劫為賢劫者菩薩處胎第三如六天王等滿四天下不如一大梵天功德廣大典領三千大千剎土諸梵天衆無量無限不可稱數壽命過一賢劫其命乃終梵王壽命既六十劫而言過賢劫如何得言多成壞劫又智論云後一劫有千佛一劫即以成壞為一故將知賢劫在一成壞又依五百王子經寶藏如來告海地尊言過一恆河沙等祇劫有劫名曰遍敷憂鉢羅華世界名願愛是時人民壽八萬歲汝於是中成無上菩提號曰寶山乃至告三姿婆言願愛世界人壽轉多八十億歲汝當心第二云人間四百年為兜率陀天上一日一夜如是日月歲數兜率陀天四千歲人間五十七億六百萬歲是呼地獄一日一夜藏論云等活等上下六如次欲天壽為一日夜壽量如次亦用彼天而言第四天獨後以百為一數之相當一何猛浪有義賢劫經云人壽二萬歲時第六迦葉佛出世人壽轉減至千二百歲時釋迦始上兜率天於天四千歲人間得五十六億七千萬歲人壽百年時下閻浮提雜論云從彌勒菩薩滅後生第四天壽四千歲一日一夜當人間四百年即准人間合五十七億六百萬歲然後下閻浮提成等正覺賢愚處胎仙人經如前已引今上生經亦同智光經定意經云彌勒五億七十六萬歲作佛以此言之彼天四千歲准人間歲得五萬七千六百之萬此以萬為首而數至於五萬七千六百萬此中若依千萬為億即為五十七億六百之萬歲當於雜心之文若依萬萬為億之數即為五億七千六百之萬歲近於定意經而言七千六百為六十故其餘三經皆言五十餘億等者並依十萬為億之數但隨翻譯之家煩有增減而已天人歲數配之略然今撿此解雖似無過而有四難一長短不當難如藏論云如是壽長遠究竟極此八十千歲是時諸人安坐受樂無所馳求壽八千歲住阿僧祇年乃至衆生未造十惡從起十惡業道時壽命因此十歲減度一百年即減十歲乃至廣說今於彼天四千歲數不滿人間阿僧祇年況百歲稍減至十從十稍增至於八萬准此而言不得相當故二二聖不齊難若據彌勒百歲時上至於八萬歲時下生即於中劫才過其半論也釋迦人壽千二百歲時上稍減至十增至八萬還減至百方乃下生即過一劫億長於前而皆言於天四千歲人間得五十餘億等如何相當三聖教相違難若釋迦經多死生彌勒於彼經少死生非但受彼四千一生故不違半劫一劫者即違經說一生補處亦違五十餘億等故四乖越壽量難瑜伽第四云四大王衆天滿足壽量是等活大那落迦一日一夜即以此三十日為一年十二月為一歲彼壽五百歲如是以三十三天壽是黑繩壽量以時分夭壽重成衆合壽量以知足天壽量成號叫壽量以化樂天壽量成大號叫壽量以他化自在天壽量成燒熱天壽量應知亦爾極燒熱大那落迦有情壽量半中劫無間大那落迦壽一中劫准此而劫無間一劫亦轉倍之然今彌勒菩薩在知足天經半劫餘釋迦菩薩在於彼天經一劫餘故經號叫壽量時已徑彼天無數死生況亦半劫等如此妨難如何可會真諦三藏云補處菩薩生於彼天雖無中夭受多死生何者一由旬城所有芥子百年去一芥子盡一刀兵劫量此之人間四百年為彼一日一夜一日夜中除四芥子一月除百二十芥子一年除一千四百四十芥子十年除一萬四千四百百年除一億四萬四千千年除十四億四萬芥子四千年除五十七億六萬粒芥子不過二三升餘然釋迦菩薩第八劫二萬歲迦葉佛時相好業滿上生兜率多天至第九劫百年時方出世從迦葉佛時二萬歲漸至十歲第八劫盡後第九劫從十歲漸上至八萬歲從八萬漸減至二萬歲時已一劫滿計既經一由旬芥子盡復更從二萬歲漸減至百年方下生故在彼天經一劫餘是知補處生兜率天無數死生但必盡四千歲然後命終故言不中夭五百菩薩等雖兜率天有多死生於剡浮提並有一生故名一生作天生也若依此義通餘經論者諸說五十餘億等之文直顯當於彼天一生之數不說上下之間唯有爾許之年以是義故前所設難都無可會有說立世經以十萬為億故云五千七百六十億年上生經千萬為億故云五十七等其實無異毗婆沙論百三十五云經於五十俱胝六十百千歲慈氏如來應等正覺出現世時施作佛事彼論百七十八云問何故菩薩唯於都史多天受天趣最後異熟不於餘天耶雖有多說而引一說唯覩史多天壽量與菩薩成佛及瞻部州人見佛業熟時相稱謂人間經五十七俱胝六十千歲能化所化善根應熟彼即是覩史多天壽量是故菩薩唯生彼天彼俱胝者即云億也故智論第七云百億日月乃至百億大梵是名三千大千世界瑜伽第三云百俱胝四大州乃至百俱胝梵世間名三千大千世界以此應言拘胝即億也婆沙百七十七云積一至百千名洛叉至百百千名俱胝百千俱胝名那庾多藏論第十二云十一為十十十為百十百為千十千為萬十萬為洛叉十洛叉為度洛叉十度洛叉為俱胝十俱胝為末施十末施為阿庾多智論第四云一一名一二二名四三三名九十十名百十百名千十千名萬千萬名億千萬億名那由他總而言之拘未盡理聖說衆多不可以三億堪會通故佛本行經第三十八辨伊羅鉢龍王事云世尊我何時得脫此龍身更何時得復於人身爾時世尊告伊羅鉢大龍王言汝大龍王從今已去過若干年若干億於後當有佛出於世名曰彌勒多施等五分律第十五云時伊羅鉢龍王作是念昔迦葉等佛記我於當來過百千萬億歲釋迦牟尼佛出現於世當記汝脫龍身時時今應至當往見佛等復白佛言願記我何時當得脫此龍身佛言當來過百千億萬歲有彌勒佛出現於世汝於爾時得脫龍身具彼應說除三億外更有何億會此教乎又彼通賢愚經等六字應云七七字應言六者良恐非也暫誹聖言久置重苦最不可故又極樂國去此婆國土多小經文亦異然不可以笇數不同而和會故今作一解彌勒所化機宜不定或聞彌勒遲下人間以生信心或聞慈氏疾下剡浮以種善根是故如來隨機宜聞而說彌勒下生時年久近差別不可凡情輒趣定其實不爾便違聖說契經化物之始阿毗達磨辨法實性尚有稱機擬宜之說況修多羅為化衆生而種善根無隨宜之說理必如是不可致怪問彌勒出時至人壽八萬即應經小劫今說五十六萬億歲下於剡浮奈何侶焉察云當今向於劫末若過五十六億萬歲即至八萬此有何妨又劫名不可數時者有多種不可數或以剎那須申日月等並據世間人心力所不知名不可數未必唯數時行年雙等為不可數極微含大千之界剎那總三際之時說五十六億萬歲而疑修促者哉基云賢劫經云人壽一千二百歲釋迦始生覩史人壽一百歲下生作佛覩史天壽四千歲人間當五十六億七千萬歲人壽百歲慈氏生天人壽八萬四千歲始下成佛當人間五十六億七千萬歲以此而推劫減時長劫增時短不應難言釋迦經增減劫何生彼天中歲數同唯增時九十一劫中有二十住劫初住劫減二萬歲時上生彼天漸至百年方下人間彌勒初住還增至八萬歲始下剡浮故二菩薩在天時等有雖二解皆不盡理極微含大千之界剎那總三際之時者乃是示理含事虗蕩之門不可以此證法相遠近故不爾如何可說彌勒生兜率天天即人之所含更無所生故又增劫時長減時唯五十六萬億歲定無是處故今解此相稱謂人間經五十七俱胝六十千歲能化所化善根應熟彼即是覩史多天壽量是故菩薩唯生彼天故彼天雖復多度死生且說最後死生壽量令生機緣渴仰心故傍論且止應歸本文佛告優波離至兜率陀天因緣者述云第四總結之也因緣即相狀所由為利益故終說上生皆有所由名因緣故此述第二廣答已訖佛滅度後至讀誦經典者述云第二勸生彼天將釋修行生兜率天略作五門一辨修因人二辨所修因三見聖不同四生得益五還解本文第一修因人雖復無量略有三例一菩薩二二乘三凡夫初菩薩者有說從初發心乃至法雲不然八地已上永離分段定不應生兜率天故今解從勝解行地至遠行地為欲供養一生菩薩故為欲聞法種善根故生兜率天次二乘者有諸衆生發心願求聲聞緣覺菩提之道善根未熟資糧未備於現身中不能悟入因佛為說兜率陀天一生菩薩十善報應極妙樂事聞彌勒名歡喜恭敬回心發願故得往生後凡夫者有諸衆生雖受禁戒不能護持造衆惡業聞名悔過離障清淨造彌勒像種種供養故得往生修人略爾第二所修因欲生淨土所修之因願兜率天者亦須修之故諸經論因雖衆多今且依此經辨彼天因略有五種一捨施因聞是菩薩大悲名稱造立形像勤修功德掃塔塗地香華衣服繒蓋幢幡種種供養於彼天處欲生即生二防非因若一念頃受八戒齊修諸善業思惟兜率持佛禁戒一日乃至七日思念十善行十善道以此功德回向願生於天處即得往生三離散因行衆等持深入正受應當繫念念佛形像於彼天處欲生即生四簡擇因讀誦經典稱彌勒名發弘誓願於彼天上即得往生五淨重因佛滅度後四部弟子及天龍等得聞彌勒菩薩名者聞已歡喜恭敬禮拜此人命終如彈指頃即得往生經文因雖有此五准論必有五門一禮拜門依名禮拜一生菩薩求生天故二讚歎門至心稱歎一生菩薩智慧光明一切功德故三作願門生兜率天修彼菩薩所行所成四觀察也所觀有三一觀彼天上功德㽵嚴二觀彼一生菩薩功德㽵嚴三觀彼天衆功德㽵嚴莊嚴既多不可具論五回向門不捨衆生回向為首所作功德回以施之共生天上故以此五門資前五因必生彼天也第三見聖故不成二因以十行中分為二故基云六事法者一精進修福敬恩悲田中所作業等二威儀不缺堅守諸前行自住軌則等三掃塔塗地修飾道場正理制多等四香華供養四事什物隨洽濟等五凡夫行三昧聞思等定聖人入正受隨所得禪或凡三昧非六行足六行定者必上生故深住聞思亦名三昧六讀誦經典演說修習十行法等且舉偏勝易行上首有此六事其中一一具攝衆業此解不盡離威儀不缺等更無諸功德故由此初解於理為善事雖有六行唯有三謂戒定慧威儀不缺即止戒行掃塔塗地香華供養即作戒行行衆三昧等即定行也讀誦經典即慧行也故地持論云六度之中前四戒學次一定學後一慧學即其義也傍論且止應釋經文精進之心遍策諸行故云勤修威者畏也儀者軌也戒與威儀雖復不同且表總義塔即佛塔地即僧地供即供具亦云備也定行非一曰衆淵奧難窮曰深三昧即三摩地此名等持今云三昧此云正受者謬也前行後入者影略也總而言之若具修六或能修五上上品生若修三四上中品生若修一二上下品生生於淨土既有九品生兜率天亦有九品故問既不斷結應生下界如何可說入正定耶答有義由此欲界亦有定心故唯識論亦云欲界有輕安不然彼說定加行亦有輕安故智論云電光定者謂欲界定者約隨轉門而作此說此即雖居下界專修六行以澄三業離諸亂想故同正受如是等人至如得六通者述云第二教回願有三初歎業勝次辨攝念後辨回願此初也雖諸凡夫不斷結使異於聖者若修六事神用廣大必定往生如得六通聖者無異即歎慧行也應當繫念至稱彌勒名者述云此次攝念也以念形像類惻真應二種法身故念形像此顯雖復修行仍須正念心想形容口恆稱念即行衆三昧等也稱彌勒名即前慧行也有說念佛即意業稱名即口業義亦可也如是等輩至發弘誓願者述云此後回願也如上所說行六事輩極少但能於一念頃至心不犯持八戒齊隨修淨業發願資助回向定生言一念者非餘時犯唯一念持戒初唯發願一念持何況多時受八戒齊即前戒行修諸淨業即前掃塔塗地香華供養雖復修因必資大願令定天果故須發四弘誓願命終之後至結跏趺坐者定出生死除煩惱故既生彼天住於梵行故於華上結跏坐也百千天子至以散其上者述云第四諸天讚勸有三初散華次讚歎後勸歸此初也摩訶曼陀羅華者即大適意華此表內心以心念故以華散之讚言善哉至來生此處者述云此次歎也所行所得既皆深極故再言善哉由習大因令成勝果故善男子者歎修行之人閻浮提者歎所修之因生此處者歎所受之果此處名至汝當歸依者述云此後勸歸也處名知足由此不耽生死主名慈尊故能垂矜苦厄歸依即覆護義謂覆生修善護離衆之心離衆惡故不墮三塗生諸善法得見彌勒應聲即禮至生死之罪者述云第五生彼利益有二初滅罪之益後不退益此初也白豪相光即所觀之處利益大故無間罪劫一增減餘處罪劫歲數為之末劫凡夫行多庸鄙能超惡境祈彼淨方夙運不彈生為上品況乎靈景獨在出豪光心專諦觀不超生死者也問隨觀一相應得滅罪何故偏說白豪之相答白豪相光以諸功德之所成故如大集經第三十七云云何菩薩助道無盡菩薩所修助道功德無量無邊菩薩於中不應限量何以故一切衆生若去來現在及聲聞緣覺所有功德於佛世尊始是成就一毛孔功德如是一一毛孔所有功德聚集成就如是成就如來一相如是一一相至三十相聚集百倍功德始成如來眉間豪相乃至修集倍是豪相百千功德始成如來無見頂相問豪光既有如是功德何故但滅九十億劫之罪答理實滅罪隨自心力多少不定今且隨機宜聞而說是時菩薩至無上道心者述云此後不退益也隨說往緣今悟前業法因知自成不退昔不退者更為堅因隨其位次成上發心如是等衆生至值遇彌勒述云第六總結成上有四一得生上二隨下生三值賢劫佛四值星宿佛此初也三業俱淨六事齊修後生彼天此復何怪隨修六事法少淨三業心期不二後定上生亦隨彌勒至第一聞法者述云此次隨下生也父母之道當感天然虎嘯風生此事何惑六事滿三業圓上品生彼者隨初會而聞法也於未來世至一切諸佛者述云第三值賢劫佛善如悲華經第二於星宿劫至受菩提記者述云第四值星宿佛積善之家必有餘慶供佛之心當有餘善故亦逢當劫之佛㽵嚴星宿之名未見聖說義准賢劫解亦無違彼二劫中千佛曾㽵嚴及當例星宿而生故仍名焉此中將讚三劫略作四門一建立之意二佛出之時三三劫次第四還解本文第一建立之意問有何義故立此三劫答觀藥王藥上菩薩經云爾時釋迦佛告大衆言我曾往昔於妙光如來末法之中出家學道聞是五十三佛名心生歡喜復教他人他人聞已轉轉相教乃至三千人異口同音稱往佛名深心敬禮即得超越無數億劫生死之罪其千人者華光佛為首下至毗舍佛於過去㽵嚴劫中得成於佛此中千佛拘留孫佛為首下至樓至如來於賢劫中得成於佛後千佛者日光如來為首下至須彌相佛未來星宿劫中當得作佛無垢稱經第六云過去轉輪王名為寶蓋今寶焰如來輪王千王子今賢劫千佛月盍王子今釋迦是智論有千萬劫過去空無有佛是一劫中有千佛興諸淨居天歡喜故名為善淨居天何以知此劫當有千佛前劫盡已廓然都盡後有大水水底涌出千枝七寶光明蓮華是千佛之相淨居諸天因此知有佛以此言之即由三千人發心因緣故立三劫而非過未必有此三也第二佛出之時問此三劫中既有千佛者為一成壞有千佛為經多成壞劫答真諦三藏云成壞空劫皆無佛出唯於住劫有佛出世於二十劫中前十劫中有佛出世後十劫無前劫中前之五劫亦無出世第六劫中拘留孫佛出世第七劫中拘郍含牟尼佛出第八劫中迦葉佛出第九劫中釋迦佛出第十劫中彌勒佛出從彌勒後無量劫中空無佛出故知千佛不得出一成壞劫又若賢劫有千佛即言同在成壞一劫中亦過去㽵嚴劫中有千佛應同在成壞一劫中若言同者如何藏論云如彼過去莊嚴劫中末後三佛毗婆尸佛即於九十一劫中初劫出世如尸弃佛毗舍浮佛即在三十一劫中出世已後無佛乃至第九十一劫即賢劫之初有拘留孫佛最初出世既說莊嚴劫中千佛末後三佛經九十劫中前後出世將知賢劫千佛亦不同在一成壞劫奘法師云增至八十億賢劫經亦同一劫增減之也然立世經云成已住者幾多已過幾多未過八小劫已過十一小劫未來第九一劫現在未盡此第九一劫幾多已過幾多未來未來定餘六百九十年在者於大無妨正是小乘宗故問復如何知大乘宗中三劫已後更無百劫修相好業答優婆塞戒經第一云我於往昔寶頂佛所滿足第一阿僧祇劫燃燈佛所滿足第二阿僧祇劫迦葉佛所滿足第三阿僧祇劫若三劫後更有百劫者釋迦不應補迦葉佛處故知大乘菩薩修因但經三劫無別百劫有義二宗互通各所引文非也真實隨轉二門故第三三劫次第問此三劫次第無間起不答有說初㽵嚴劫望於賢劫定應無間故藥尚經說莊嚴劫千佛最先成佛名和光最後成佛名毗舍毗舍即前九十劫中第三十一劫佛是也以此劫後不說別劫至第九十一劫方說賢劫即知前九十劫以云名莊嚴劫其星宿劫聖說不定大般若第九云佛告阿難陀言此從坐起無量苾芻從是已後六十一劫星宿劫當得作佛皆同一號謂大幢相如來以此將知六十一劫為星宿劫星宿劫前皆名賢劫賢劫經第十云爾時普廣意轉輪聖王即定光如來是也其佛侍者名曰無損智比丘者唯衛佛是也其王千子是賢劫中千佛過千佛已六十五劫當斷無佛然後有劫號大名稱皆同斯劫成最正覺其彼世時八萬大臣在大名稱劫而復道覺過劫已中間斷絶竟八十劫都無佛興然後有劫名喻星宿其八萬大臣於斯劫中成最正覺過星宿劫中間斷絶境三百中劫亦無佛興然後有劫名重清淨此轉輪聖王后綵女八萬四千當於其劫成最正覺以此言之賢劫已後有大稱劫然後乃有星宿劫中萬佛出世問藥尚經說三劫千佛次第而起如何此經說賢劫後更有多劫方說星宿劫答應作二解初解藥尚經星宿劫即賢劫經大名稱劫但恐名濫後星宿劫以異名說其實名無別故大般若經云從是已後六十一劫星喻劫中當得作佛故知大名稱劫即星宿劫後解劫量長短不定星宿劫者總含多劫故大般若經說星宿劫初名星宿劫故但說六十一劫為星宿劫賢劫經說星宿劫終縛象三種對法據多分且說三種涅槃意通捉矩之屬對法樂損涅槃中無初八開差別故即對法四俱彼生故對法讒揲即是兩舌名別義同故雜心小宗但說重者名非律儀餘者輕故由此義故頭數雖別而不相違有說此惡律儀亦攝一切犯戒惡行非也處中之惡應成惡律儀故傍論且止還釋文其墮耶見及惡律儀有佛無中邊諸方皆備有之若聞彌勒名皆定不墮三業歸依深心歡喜四等宿願威力加故恆生正見至不謗三寶者述云此後有善有三一恆生正見即反前耶見也二眷屬成就即反前惡律儀也三不謗三寶即反前不墮暗處不生邊地恆逢三寶生信向故不但中品無惡有三善上下品生隨應立有欲明聞名者改八部之異形受四生之勝體偏於中品而獨說之優波離至速得清淨者述云第三辨下品生即衆犯戒悔淨往生也於中有三初悔歸罪滅修行往生次見聖不退後值未來佛初又有三初罪滅次修行後往生此初罪滅有二一者先受戒禁而後犯之二者先不受戒造衆惡業聞名歸禮兩手二足及以頭首五體投地至誠懺悔罪速清淨未來世中至禮拜繫念者述云此次修行也設不作罪懺悔願生但修十行定得生彼一聞名稱二造形像三香供四華供五衣服供六繒蓋供七幢供八幡供九身恆禮拜十心思繫念此人命終時至得往生者述云此後往生也犯戒造惡歸依清淨聞名修行命欲終時菩薩放白豪之妙光滅其罪暗雨綺華之麗色長其道種佛天來迎表慈深故須臾往生顯業勝故總相雖然委悉說者懺悔造像供養禮拜及繫念者下品上生懺悔造像供養禮拜不恆繫者下品中生懺悔造像供養而已不恆禮拜不常念者下品下生雖歸悔罪得銷除不造形像供養禮拜等或但形像或但供養或但禮拜或但繫念或一稱名亦下下品設不生彼三會之中亦得度脫值遇彌勒至得不退轉者述云第二見聖不退善根久熟見便禮敬慈悲自起疾得聞法除不信心速得不退有說十信位中不退之心名得不退於未來世至諸佛如來者述云第三當值佛也即於當來得值星宿劫後恆沙諸佛而非星宿劫中諸佛不爾便違上品三生唯值星宿劫諸佛故此上往生雖復三類九品而生並內衆中親得見佛速聞法也若生外衆雖第九品任運後時還成不退佛號慈尊善自長故此述初修行往生已訖佛告優波離至作大歸依者述云第二總勸歸聖證得善利有三初聖作歸依次歸者不退後見光受記此初之也釋迦滅度五道衆生沈淪苦海無所依恃既未逢真報之佛皆屬慈尊作歸令度若不見者便失大利故云大歸依處若有歸依至得不退轉者述云此次歸得不退也有說歸依彌勒即得入位益不然入位即入十信故多劫修行得入十信處信處說故今解值彌勒必得菩提故得不退轉彌勒菩薩至即得授記者述云此後得授記也多陀阿伽度如來也阿羅呵應也三𦵧三佛陀正遍知也其得聖者慧矚智光若凡夫人眼見金色因既不退果無上佛告優波離至繫念思惟者述云第三示歸聖者滅罪多少三類九品願往生者修十善行念名恭敬滅罪異故於中有二初辨樂生業滿得生後辨不樂行亦未滿初又有四一令念二勸行三教願四滅罪此初也即以繫念思惟善心為生兜率天因也欲念兜率陀天至行十善道者述云第二勸行也且論持戒不說餘業舉其極少一日至七日亦得往生何況多年多生修行以一切善十善攝盡故思念之行據重者名十善道有說別以前行為往生因總以十善為往生因不然戒及業道行修別故以此功德至當作觀者述云第三教願也有行無願而行必孤未必得生慈氏所故有願無行而願必虗前既無因果不生故所以教願與行相扶作是觀者至生死之罪者述云第四滅罪有三初逢緣駐想次聞名起敬後禮拜投誠此初緣有三初有情即見一天人也隨遇一有情緣即念彌勒有苦念無樂念與惡者念除善者念攝勝者欣求劣者念厭善友念崇惡友念拒復諸法即見一蓮華也隨遇一法即念彌勒好法思供養惡法不遇染法欣斷淨法欣修然今且舉念一切時念不暫休廢若一念頃念滅千二百劫生死之罪慈氏宿願念者心專故致於此但聞彌勒名至生死之罪者述云此次聞名起敬也前言若逢緣一念頃念滅千二百劫此但聞名合掌恭敬除五十劫者但發身業首不至地歸心輕故若有至心生死之罪者述云此後禮拜投誠以首至地日夜相續除罪百億劫身心等歸並皆重故此為最重見豪第二一念頃第三聞名合掌第四輕重異故問何故見身豪相不如遙念答見佛身相滅罪實多良以遙念行而難生見歸崇而易起行化之法先勸作難修後勸作易行又人間苦重欣意殊深天上樂多厭心誠淺又遙念者一念頃時長故意念故見光者暫時間時短故眼見故故遙念者滅罪多見光豪者滅罪少問聞名歸念滅罪多少經有誠文造形供養功德亦有多少答功德更多作事相續念亦大故此中且舉少念少禮一暫歸聞若數數聽聞頻頻敬禮朝朝供養功德更多前三品修但辨得生之福未論滅罪之相故至於此方示歸聖者滅罪多少有義一念稱名唯有語業而無餘二聞名合掌亦有身業至心敬禮具有三業故滅罪多少不同然不身語二業必有意業故然賢劫經約下位菩提稱供禮拜故云除百千萬阿僧祇劫生死之罪亦不違此也設不生天至發無上道心者述云第二不樂生天業力未滿未滿善故龍華三會亦發道心前樂生天三品業滿龍華三會皆悉得道此唯發心故有差別菩薩處胎經第三云汝生快樂國不如我國苦汝說法甚易我說法甚難初說九十六受我五戒者次說九十四受持三歸者後說九十二一稱南無佛據實上品生修六事法而言受五戒初會得度者且舉修六中威儀不缺而已上品下生唯一事故受持三歸第二會度者中品上生具三業故一稱南無佛第三會度者下品下生唯口念故彼經略舉三中各一所修故不相違問預造彌勒當成佛形者從後境中生福耶答有義從未來境生福以心信未來故而為讚美即時大士當得作佛故造佛形而菩薩善資若追造佛昔菩薩形亦有兩義例之可解有義不然正從去來之境發福心亦去來隔於現在現在無資故預造彌勒當成佛形即於本地生追造亦然不爾便違毀謗得罪義故問若爾來力所任持故又涅槃云二施果報等無差別者以本佛同故傍論且止應釋經文此述初勸生彼行已訖說是語時至百千匝者述云第二衆發希願有二初衆發願後佛記生初又有二初威儀後發願此初也從坐起者表生於彼從生死起禮二足者捨煩惱故繞佛菩薩百千匝者形百千生常不離故未得道者至兜率陀天者述云此後發願也未得道者但舉凡夫聖隨願故不還無學神通可往勵勸末代故不談聖未來值遇三會得度捨此身已方願生上故世尊記曰至之所攝受者述云第二佛記生也汝等及未來下品行者乃至一念稱彌勒名皆得生彼況能修福持戒上品不生三乘五乘皆度脫故佛告優波離至為耶觀者述云第三結成正觀為度末代殷勸往也今此一經雖有三分而初二分已訖爾時尊者至我今隨喜者述云第三問名喜行分有四一問二答三時衆獲益四喜退流通初中後二初讚說隨喜後正問持名此初也歎凡及聖功德業果故成前說皆通二感聞說慶悅故言隨喜唯然世尊至何名此經者述云此後問持名也唯然者敬諾之詞此經要妙如何受持行之儀軌復何名之佛告阿難至莫斷佛種述云第二答有二此初答受持也我今滅度末代無依故歡受持敕令不忘為令未來近受天中之法樂捨四趣之淪喪遠示菩提之妙相出三界而超驤經在有植善根法滅便須斷佛種佛謂圓覺種名為因慧學故慧生不學種斷此經名至至如是受持者述云此後正答名也說彌勒菩薩涅槃之事故以為名示生彼相令有矚觀勸進發心流通萬代依名釋義如是受持受謂領納在心持者任持之不忘佛說是語至首楞嚴三昧者述云第三時衆獲益有二初聖益後凡益此初也或有經云十方菩薩此即善慧地滿心菩薩聞此經故得入第十地健行之定以此證知變化身亦化地上菩薩不爾當知雖復一會所見異故聞他受用身之所說法而得法雲首楞嚴定同時處凡聖麁妙之身佛地論說故有說十法菩薩聞此經故即得進成金剛三昧不然無別說故八萬億諸天至彌勒下生者述云此後凡益即此方兜率天衆得益之也非但當時發心亦願未來隨生故是何種姓故今作一解一者菩薩行法不厭生死者受生死苦行利樂故樂生天者託勝所依修妙行故於一切生受尊貴故處劣自體行不圓故生天得見彌勒佛故不同二乘厭生死苦恐天放逸不樂生也二者愛敬無上菩提心者即示修勝行求大菩提於彌勒所聞大法故不樂大乘希小果者隨受生處欣涅槃故三者欲為彌勒作弟子者願於惡界為作善利苦有情所希行救濟不願淨土作餘佛弟子欣無苦有情可行濟度無苦可厭欣心不深故又釋迦末法持戒犯戒有戒無戒釋迦皆囑彌勒度之自揣解行難生淨土可為彌勒作弟子者於上所說天宮處所應作是觀其觀者後作是觀者至上妙快樂者述云第二教生彼行也欲生彼天即修五因一持五戒二持八戒二持具足戒即是出家五衆所受皆名具戒勤等戒雖非具戒具延方便故立此三戒之所以廣如瑜伽論四身心精進不求斷結精純無惡雜故進謂升進不懈退故不求斷結者非作精進六行斷結斷結便生上二界故五修十善法足離煞等廣如對法等今此且論凡夫散心五粗因行感內外院增上果業未是巨細分別解釋生彼業因廣勸生中方具教示雖修此因要須一一思惟彼天上妙快樂回願生故前行非觀觀為首故思惟彼樂作是觀者述云此後結正觀也知佛時遙病重行𨷂受佛付囑欣當佛度末代津梁真為世觀業識淺微智量踈拙欣生報土越分所望不稱病行名為耶觀此上述初外果已訖爾時優波離至極妙樂事者述云第二辨內果有三初發請次廣答後結勸生彼初又有三初請儀次歎勝後正請此初二也令此大士至何時生彼者述云此後正請有二初問此沒後問生彼不以對沒難以顯生故兼足也有義准答即有五問一問彌勒既生兜率從今已後示知此人更經幾年何月何日人間命終上生彼天二問彌勒捨命之時身在何國何村何家三問彌勒臨命死相四問彌勒死後殯相五問彌勒天上受身之相雖有五問問中略有最初之問此解不然中間三答傍乘義故非別問也佛告優波離至二月十五日者述云第二佛答有四一答此沒後二答生彼三住天壽表聞受記修十二住得度生死十二緣起二月者即春陽之月種植根裁華果穀榮百獸孚乳此中二月況二種法身陽春和液人所愛樂即喻智者樂於如來常樂我淨種植者喻聞法歡喜發菩提心根裁者喻於十方諸大菩薩來詣佛所咨受大乘之法孚乳者喻佛弟子生諸善根華喻七覺果喻四果以是義故二月沒也其十五日亦有十一事一者破暗喻破無明二令見道非道喻說正道耶道三令見耶正喻示生死涅槃四除蒸得清凉喻令人遠離貪嗔等熱五破螢火高心喻破外道光明六息賊盜之想喻破煩惱結賊七除衆生畏惡獸心況滅畏五蓋心八敷優鉢羅華喻開衆生種善根心九合蓮華喻覆蓋衆生五欲之心十發行人進路之心喻起衆生進修趣向涅槃之行十一令諸衆生示受五欲多獲快樂喻令諸衆生示修解脫以是義故二月之內上十五日以命終之准涅槃經理必應然佛與菩薩雖覆不同利樂之意等無異故於此波羅捺國至還至生處者述云第二假處也波羅捺者云江繞城劫波利者此云捉髑髏鬼波婆利者此云大護即於本國本村本父父生之處釋迦欲表此方緣畢餘方教化故於迦維生俱尸那滅慈氏菩薩此緣未盡表於此滅復於此生行利他故還本生處而命終也母家即南天竺波婆利國故名還至問彌勒性慈何故父母皆波婆利答慈氏即表德之姓波婆利者本俗之姓更勘然彌勒生處聖教不同華嚴經入法界品彌勒菩薩告善哉童子言我於此閻浮提南界摩離國內拘提聚落波羅門家種姓中生為欲滅彼高慢心故化度父母及親族故於此命終生兜率天為欲化度被諸天故賢愚經同第十六云波羅奈王名波羅摩達有補相生一男兒三十二相衆相好備滿輔相增悅即召相師相師占言有大德之相故國人民悉聞彌勒所有高勝德相之聲國王聞之懷懼憂此子有德之相必奪我德欲煞其子故即敕輔相汝子可將來吾欲見此因緣故輔相密遣波婆梨所此波婆梨在婆梨富國令彼養乃至廣說今此上生經亦異彼二經如何可會答別答初反故不答爾許時下生故佛告阿難至執在心懷者述云第二如來許說彌勒出世者正許佛問兼佛經幾時國土豐樂者許境豐樂弟子多少者許弟子翼從恐聞而忘失說即無益故思在心懷是阿難時至即還就坐者述云第三阿難領旨斂許說之旨故曰受教順定坐故還就坐爾時世尊至於此國界者述云第四佛答問有二初正答問後勸修因初又有四一答境豐樂二答佛三答弟子四答幾時答衆問中兼辨神變故不別答初又有四一國邑莊嚴二地土廣美三人民相和四王臣勝善初又有三初城邑莊嚴次龍王加好後鬼神除惡初又三初時次處後城此初二也說此經時望彌勒出經五十六億萬歲故云將來久遠上生經曰如彌勒下生經說者即指此也有說經半劫故將來久遠但上生經為宜物聞故約彼天壽而說五十六億萬歲此說可也義之如前裝法師云西方說故王舍城是香第城未來有王名餉佉所都大城名雞頭未此名慧檀那越披提羅達所在國名波羅那夷今我釋迦文佛父字悅頭檀剎利種母字摩耶所治國名迦維准義而言唯衛等佛父雖是國王而迦葉佛父應非國王以云所在不言所治故長阿含第一言迦葉佛父名梵德波羅門種母名曰財主是時王名汲毗王所治國名波羅捺餘雖異名華夷不同應無違也毗婆尸佛時大臣名提舍餘者可勘斯能分別至國界若干者述云此次歎現在智現在國界既無數量不可具論略如十住婆沙論亦復明了至真等正覺者述云此後歎未來智智雖復照當來諸佛慶喜欲問彌勒化導故且舉蠰佉時之事也欲聞其變至為經幾時者述云第二陳請請其五事一佛神力即變也二徒衆多少即弟子翼從也三彌勒成佛即佛也四依報莊嚴即境豐樂也五住世之時即經幾時也有說變者國土人民前後不定故言變非神力變無別答故幾時者問五十六億萬歲之時而非住時不然如來前五因皆見菩薩應化二身而來迎接約增而言唯修施因以得見聖由其施行能捨財物造立形像種種供養表聖聖故見應化而來迎接問禪定智慧二種因緣何故不見乃約施行以彰見聖若據實而論修定慧因皆有始修終成之義若約終成合理之定內證真智實見菩薩應化來迎今據始修不契理證所以不見已成施行所表處勝故約之辨見上生不同第四彰生獲益因既衆多獲益遂異雖復無數旦依此經得益有二一滅罪益二聞法益初益有六一歸依得益如經云禮已諦觀眉間白毫即得超越九十億劫生死之罪二禮敬得益如經云若有禮敬彌勒菩薩除百億劫生死之罪三聞名得益如經云但得聞是彌勒名者不墮黑暗邊地耶見諸惡律儀四滅罪得益如經云但聞彌勒名合掌恭敬除五十劫生死之罪五聞稱得益如經云若一念頃稱彌勒名此人除却千二百劫生死之罪六悔過得益如經云男子女人犯諸禁戒造衆惡業聞是菩薩大悲名字五體投地誠心悔懺是諸惡業速得清淨後法益有三一聞法獲益如經云是時菩薩隨其宿緣為說妙法令其堅因不退轉於無上道心二遇聖獲益有三一現值聖益如經云值遇彌勒亦隨彌勒下剡浮提第一聞法二生值聖益如經云值遇賢劫一切諸佛三後值聖益如經云於未來得值恆沙等諸佛三授記獲益有二初為彌勒受菩提記如經云若有歸依彌勒菩薩當知是人於無上道得不退轉菩薩成佛見佛光明即得授記後為諸佛授記如經云於星宿劫亦得值遇諸佛世尊於諸佛前授菩提記傍論且止應歸釋文第五之門也於中有三初勸生彼行次衆發希願後結成正觀初又有三初修因往生品類不同次總勸歸聖證得善利後示歸聖者滅罪多少初中後三初上品因生次中品因生後下品因生初中復六一示修因二教回願三正往生四諸天讚勸五生彼利益六總結成上初又有二初總表即勤修功德也後別解即六事因也何者為六一護戒行即威儀不缺故二敬塔行即掃塔塗地也三供養行即以衆名香妙華供養也四等持行即行衆三昧入正受也五讀誦經行六誦經行即讀誦經典也有說一威儀不缺二小乘宗既有不同如何諸教令可准一今作此說依小乘宗三劫未必無間而起減佛善少故今依大乘三劫定應無有間絶善根多故成住壞劫如次名為莊嚴賢劫星宿劫理無違故傍論且止應歸釋文第四之門也菩提名覺覺諸法故授亦云受受是弟子授是如來如來授與記其必得故名授記弟子領意信得不虗故名受記將講授記略作五門一授記意二授記者三授記人四時差別五釋文第一授記意如來授記自有五意一大師逆照二因必得果三令他人起敬四不捨衆生有作佛義五行位已高由此五義故須授菩提之記也第二授記者佛有三身有說若授二乘及地前菩薩記唯是化身若授大地菩薩記通有報身故攝論云化身為二乘及地前菩薩說法應身為地上菩薩說法楞伽經說應化佛為應化聲聞授記報法佛而授記別智論說法性生身佛說法十位菩薩能受此解不然化身既化大地菩薩應身亦應化二乘凡夫故若不許然便違佛地論神力加而令暫見故法身雖復說法與授記義有異故應說諸能授者必是化身及他受用身思之可解第三受記人有五故資糧論云一未發心二共發心三隱覆四現前五密意前四授大乘人後一授小乘人初未發心者有說當十信位由得增上信故不然十信已前尚已發心況亦十信而未發心今解無始之來至未發菩提之心故莊嚴論判為性地即性種姓故如首楞嚴經云是人往來五道諸根猛利好樂大法佛知是人過此若干百千萬億阿僧祗劫當得阿耨菩提心次共發心者有說十解十行位由得增上行故不然十信亦已發心故今解善法欲去名為發心故彼論云成熟善根種菩提種得增上行但欲解脫諸衆生故即發心時入不退轉無墮落法離八不間即八難也次隱覆者始從十向至七地位若聞自授記於六度行不發精進不聞更發欲使斷他念此菩薩勤心精進幾時得菩提疑故與授記有說乃至七地未得法爾不退於行有時退故不然初地已行必不退故次現前者若菩薩成就出世五根得無生忍住不動地時非前後諸佛現前授記作佛故後密意者如法華經說我等皆隨喜大仙密意語如
